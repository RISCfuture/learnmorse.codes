# This workflow will do a clean install of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - name: Enable Corepack
        run: corepack enable
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          cache: yarn
          node-version-file: .nvmrc
      - name: Install dependencies
        run: yarn install
      - name: Run unit tests
        run: yarn test:unit
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - name: Enable Corepack
        run: corepack enable
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          cache: yarn
          node-version-file: .nvmrc
      - name: Install dependencies
        run: yarn install
      - name: Install Playwright system dependencies
        run: yarn playwright install-deps chromium
        timeout-minutes: 3
      - name: Install Playwright Browsers
        run: yarn playwright install chromium
        timeout-minutes: 3
      - name: Build project
        run: yarn build
      - name: Run E2E tests
        run: yarn test:e2e
  lint:
    name: Linters
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - name: Enable Corepack
        run: corepack enable
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          cache: yarn
          node-version-file: .nvmrc
      - name: Install dependencies
        run: yarn install
      - name: Run linters
        run: yarn lint
      - name: Type check
        run: yarn type-check
